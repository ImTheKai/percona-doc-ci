name: Run doc tests v2 (scenario-based)

# Reusable workflow — call this from any Percona doc repo.
#
# Instead of extracting and replaying code blocks from a single page, this
# workflow runs named user-journey scenarios. Claude Code acts as a real user,
# navigates the documentation freely across multiple pages, executes every
# command it encounters, and reports exactly what fails and why.
#
# Three jobs:
#   planner  — selects which scenarios are relevant to this PR
#   execute  — runs each selected scenario in parallel (one Claude session each)
#   report   — aggregates results and posts a single PR comment

on:
  workflow_call:
    inputs:

      # ── required ────────────────────────────────────────────────────────────
      repo-name:
        description: "Short repo name (e.g. postgresql-docs). Used in job labels and comments."
        required: true
        type: string

      # ── optional ────────────────────────────────────────────────────────────
      scenarios-path:
        description: |
          Path to the doc-repo's own scenario files (relative to repo root, with trailing slash).
          Defaults to scenarios/. Create this directory and add scenario .md files to it.
          If the directory doesn't exist, only the built-in scenarios from percona-doc-ci are used.
        required: false
        type: string
        default: "scenarios/"

      tooling-ref:
        description: "Git ref of this (percona-doc-ci) repo to use for skills, scenarios, and planner."
        required: false
        type: string
        default: "v2"

      # Accepted for backward compatibility with v1 callers — not used in v2.
      doc-path:
        description: "Ignored in v2. Accepted for compatibility with v1 callers."
        required: false
        type: string
        default: ""

    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:

  # ── Job 1: Planner ──────────────────────────────────────────────────────────
  planner:
    name: "Select scenarios for ${{ inputs.repo-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      scenarios: ${{ steps.plan.outputs.scenarios }}

    steps:
      - name: Check out doc repo (PR branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for git diff

      - name: Check out percona-doc-ci tooling
        uses: actions/checkout@v4
        with:
          repository: ImTheKai/percona-doc-ci
          ref: ${{ inputs.tooling-ref }}
          path: _doc-ci-tools

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Build planner prompt
        env:
          DOC_SCENARIOS_PATH: ${{ inputs.scenarios-path }}
          BASE_BRANCH:        ${{ github.base_ref || 'main' }}
        run: |
          # Inject runtime values into the planner prompt template
          sed \
            -e "s|{{DOC_SCENARIOS_PATH}}|${DOC_SCENARIOS_PATH}|g" \
            -e "s|{{BASE_BRANCH}}|${BASE_BRANCH}|g" \
            _doc-ci-tools/planner/planner-prompt.md > /tmp/planner-prompt.md

      - name: Run planner agent
        id: plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          PLANNER_OUTPUT=$(claude -p "$(cat /tmp/planner-prompt.md)" \
            --dangerously-skip-permissions \
            2>/tmp/planner-stderr.txt)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Planner exited with code $EXIT_CODE"
            cat /tmp/planner-stderr.txt || true
          fi

          # Extract the scenarios= line (must start at column 0, no code block wrapping)
          SCENARIOS_LINE=$(echo "$PLANNER_OUTPUT" | grep '^scenarios=\[' | tail -1)

          if [ -z "$SCENARIOS_LINE" ]; then
            echo "::warning::Planner did not emit a scenarios= line — running no scenarios"
            echo "Planner output was:"
            echo "$PLANNER_OUTPUT"
            SCENARIOS_LINE='scenarios=[]'
          fi

          echo "Selected: $SCENARIOS_LINE"
          echo "$SCENARIOS_LINE" >> "$GITHUB_OUTPUT"

  # ── Job 2: Execute (matrix, parallel) ──────────────────────────────────────
  execute:
    name: "Scenario: ${{ matrix.scenario }}"
    needs: planner
    if: needs.planner.result == 'success' && needs.planner.outputs.scenarios != '' && needs.planner.outputs.scenarios != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true       # warn-only — never block merge

    strategy:
      matrix:
        scenario: ${{ fromJson(needs.planner.outputs.scenarios) }}
      fail-fast: false            # all scenarios run even if one fails

    steps:
      - name: Check out doc repo (PR branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check out percona-doc-ci tooling
        uses: actions/checkout@v4
        with:
          repository: ImTheKai/percona-doc-ci
          ref: ${{ inputs.tooling-ref }}
          path: _doc-ci-tools

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve scenario file
        id: resolve
        env:
          SCENARIO_ID:        ${{ matrix.scenario }}
          DOC_SCENARIOS_PATH: ${{ inputs.scenarios-path }}
        run: |
          DOC_SCENARIO="${DOC_SCENARIOS_PATH}${SCENARIO_ID}.md"
          CI_SCENARIO="_doc-ci-tools/scenarios/${SCENARIO_ID}.md"

          if [ -f "$DOC_SCENARIO" ]; then
            echo "Using doc-repo scenario: $DOC_SCENARIO"
            cp "$DOC_SCENARIO" _scenario.md
          elif [ -f "$CI_SCENARIO" ]; then
            echo "Using built-in scenario: $CI_SCENARIO"
            cp "$CI_SCENARIO" _scenario.md
          else
            echo "::error::Scenario file not found for ID: ${SCENARIO_ID}"
            # Write a synthetic FAIL result so the report job can include it
            cat > "scenario-${SCENARIO_ID}.md" << EOF
\`\`\`scenario-result
id: ${SCENARIO_ID}
status: FAIL
\`\`\`

### What failed
Scenario file not found. Looked in:
- \`${DOC_SCENARIO}\`
- \`${CI_SCENARIO}\`

Add the scenario file to one of those locations, or check that the planner emitted the correct ID.
EOF
            exit 0
          fi

      - name: Build executor prompt
        run: |
          # Combine shared skills + scenario into a single prompt
          {
            cat _doc-ci-tools/.claude/commands/doc-navigate.md
            echo ""
            echo "---"
            echo ""
            cat _doc-ci-tools/.claude/commands/scenario-execute.md
            echo ""
            echo "---"
            echo ""
            cat _doc-ci-tools/.claude/commands/scenario-report.md
            echo ""
            echo "---"
            echo ""
            echo "# Scenario"
            echo ""
            cat _scenario.md
            echo ""
            echo "---"
            echo ""
            echo "**Context:** The doc repo is checked out at \`$(pwd)\`. Read doc files using relative paths from this directory."
          } > _full_prompt.md

      - name: Run executor agent
        id: execute
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCENARIO_ID:       ${{ matrix.scenario }}
        run: |
          claude -p "$(cat _full_prompt.md)" \
            --dangerously-skip-permissions \
            > "scenario-${SCENARIO_ID}.md" 2>&1 || true

          echo "--- Scenario output ---"
          cat "scenario-${SCENARIO_ID}.md"

      - name: Upload scenario output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scenario-${{ matrix.scenario }}
          path: scenario-${{ matrix.scenario }}.md
          retention-days: 7

  # ── Job 3: Report ───────────────────────────────────────────────────────────
  report:
    name: "Post PR comment"
    needs: [planner, execute]
    if: always() && needs.planner.result == 'success' && needs.planner.outputs.scenarios != '' && needs.planner.outputs.scenarios != '[]'
    runs-on: ubuntu-latest

    steps:
      - name: Download all scenario outputs
        uses: actions/download-artifact@v4
        with:
          pattern: scenario-*
          merge-multiple: true
        continue-on-error: true     # no artifacts if all scenarios timed out

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const repo = '${{ inputs.repo-name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Collect scenario output files
            let files = [];
            try {
              files = fs.readdirSync('.').filter(f => f.startsWith('scenario-') && f.endsWith('.md'));
            } catch (_) {}

            if (files.length === 0) {
              // No artifacts — all executors may have timed out or been skipped
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Doc scenario tests** for \`${repo}\` — no results collected (executors may have timed out).\n\n[View run](${runUrl})`,
              });
              return;
            }

            // Parse each scenario output file
            const results = [];
            for (const file of files.sort()) {
              const content  = fs.readFileSync(file, 'utf8');
              const blockRe  = /```scenario-result\n([\s\S]*?)```/;
              const blockMatch = content.match(blockRe);

              if (!blockMatch) {
                // No result block — treat as failure, include raw tail
                const id = file.replace(/^scenario-/, '').replace(/\.md$/, '');
                const tail = content.slice(-3000).trim();
                results.push({ id, status: 'FAIL', details: `No structured result block found in output.\n\n<pre>${tail}</pre>` });
                continue;
              }

              const block       = blockMatch[1];
              const idMatch     = block.match(/^id:\s*(.+)$/m);
              const statusMatch = block.match(/^status:\s*(.+)$/m);
              const id     = idMatch     ? idMatch[1].trim()     : file.replace(/^scenario-/, '').replace(/\.md$/, '');
              const status = statusMatch ? statusMatch[1].trim() : 'FAIL';

              // Everything after the closing ``` fence is the human report
              const afterBlock = content.replace(/[\s\S]*?```scenario-result[\s\S]*?```/, '').trim();
              results.push({ id, status, details: afterBlock });
            }

            // Build the comment
            const allSkip = results.length > 0 && results.every(r => r.status === 'SKIP');
            if (allSkip) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body: `> ℹ️ **Doc scenario tests** for \`${repo}\` — no scenarios were affected by the changes in this PR.`,
              });
              return;
            }

            const passed  = results.filter(r => r.status === 'PASS').length;
            const failed  = results.filter(r => r.status === 'FAIL').length;
            const skipped = results.filter(r => r.status === 'SKIP').length;

            const headline = failed > 0
              ? `⚠️ **Doc scenario tests** for \`${repo}\` — **${failed} scenario(s) failed** (non-blocking)`
              : `✅ **Doc scenario tests** for \`${repo}\` — **all ${passed} scenario(s) passed**`;

            const tableRows = results.map(r => {
              const icon = r.status === 'PASS' ? '✅' : r.status === 'SKIP' ? '⏭️' : '❌';
              return `| ${icon} \`${r.id}\` | ${r.status} |`;
            });

            const failDetails = results
              .filter(r => r.status === 'FAIL' && r.details)
              .map(r => [
                `<details>`,
                `<summary><b>${r.id}</b> — failure details</summary>`,
                ``,
                r.details,
                ``,
                `</details>`,
              ].join('\n'))
              .join('\n\n');

            const parts = [
              headline,
              '',
              '| Scenario | Status |',
              '|----------|--------|',
              ...tableRows,
            ];

            if (failDetails) {
              parts.push('', failDetails);
            }

            const skipNote = skipped > 0 ? `\n> ⏭️ ${skipped} scenario(s) skipped — not affected by this change.` : '';
            parts.push(skipNote, '', `[View full run](${runUrl})`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: parts.filter(p => p !== null && p !== undefined).join('\n'),
            });
